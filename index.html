<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="description" content="Mini Weather Pro - Accurate, Fast, Privacy-First Weather App">
    <meta name="theme-color" content="#1e88e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Mini Weather Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { -webkit-user-select: none; user-select: none; scroll-behavior: smooth; }
        body { -webkit-user-select: text; user-select: text; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        :root {
            --safe-top: max(12px, env(safe-area-inset-top));
            --safe-bottom: max(12px, env(safe-area-inset-bottom));
            --safe-left: max(8px, env(safe-area-inset-left));
            --safe-right: max(8px, env(safe-area-inset-right));
            --bg: #0a0a0a;
            --bg-alt: #141414;
            --bg-card: #1a1a1a;
            --text: #f0f0f0;
            --text-dim: #888888;
            --text-muted: #555555;
            --accent: #1e88e5;
            --accent-light: #64b5f6;
            --accent-glow: rgba(30,136,229,0.25);
            --border: #2a2a2a;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        [data-theme="light"] {
            --bg: #f5f7fa; --bg-alt: #ffffff; --bg-card: #ffffff;
            --text: #1a1a2e; --text-dim: #666666; --text-muted: #999999;
            --accent: #1565c0; --accent-light: #1e88e5; --accent-glow: rgba(21,101,192,0.15);
            --border: #e0e0e0; --shadow: 0 4px 24px rgba(0,0,0,0.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        header {
            background: var(--bg-alt);
            border-bottom: 1px solid var(--border);
            padding: var(--safe-top) var(--safe-left) 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .header-title {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            font-weight: 600;
        }

        button:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        button:active {
            transform: translateY(0);
        }

        .icon-btn {
            background: var(--bg-card);
            color: var(--accent);
            padding: 8px 12px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        main {
            padding: 16px var(--safe-left) var(--safe-bottom);
            max-width: 1200px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-btn {
            padding: 12px 16px;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: var(--transition);
            white-space: nowrap;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .weather-card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-alt));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .location-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .location-name {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .api-source {
            font-size: 0.75rem;
            color: var(--text-dim);
            background: var(--bg);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .temperature-display {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .temp-main {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .temp-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .condition-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .feels-like {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--accent);
            background: var(--bg-alt);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-unit {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .alerts-container {
            margin-bottom: 20px;
        }

        .alert {
            background: var(--bg);
            border-left: 4px solid var(--warning);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            animation: slideIn 0.3s ease-out;
            cursor: pointer;
            transition: var(--transition);
        }

        .alert:hover {
            background: var(--bg-alt);
        }

        .alert.danger {
            border-left-color: var(--danger);
        }

        .alert.success {
            border-left-color: var(--success);
        }

        .alert-icon {
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-weight: 700;
            margin-bottom: 2px;
        }

        .alert-text {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .forecast-section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hourly-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
        }

        .hourly-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            min-width: 80px;
            text-align: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .hourly-item:hover {
            border-color: var(--accent);
            background: var(--bg-alt);
            transform: translateY(-4px);
        }

        .hourly-time {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .hourly-icon {
            font-size: 1.8rem;
            margin: 4px 0;
        }

        .hourly-temp {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .hourly-detail {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .daily-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .daily-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
            transition: var(--transition);
        }

        .daily-item:hover {
            border-color: var(--accent);
            background: var(--bg-alt);
            transform: translateY(-4px);
            box-shadow: 0 8px 16px var(--accent-glow);
        }

        .daily-date {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .daily-icon {
            font-size: 2.5rem;
            margin: 8px 0;
        }

        .daily-condition {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            min-height: 2.4em;
        }

        .daily-temps {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .temp-max {
            color: var(--accent);
        }

        .temp-min {
            color: var(--text-dim);
        }

        .daily-details {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .garden-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
        }

        .garden-plant {
            font-size: 6rem;
            margin: 20px 0;
            animation: grow 0.6s ease-out;
        }

        @keyframes grow {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .garden-status {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--accent);
        }

        .garden-details {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .garden-streak {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 1.3rem;
            font-weight: 700;
        }

        .ai-forecast-box {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-alt));
            border: 1px solid var(--accent-glow);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }

        .ai-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--accent);
        }

        .ai-content {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .setting-group {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }

        .setting-label {
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }

        .setting-description {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        select, input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--text-muted);
            transition: var(--transition);
            border-radius: 28px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: var(--transition);
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .device-selector {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }

        .device-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .device-option {
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            background: var(--bg);
        }

        .device-option:hover {
            border-color: var(--accent);
        }

        .device-option.active {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .device-option-label {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .device-option-size {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .foldable-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .foldable-option {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            background: var(--bg);
            font-size: 0.9rem;
        }

        .foldable-option:hover {
            border-color: var(--accent);
        }

        .foldable-option.active {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            gap: 8px;
        }

        .spinner {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: spin 1.4s infinite;
        }

        .spinner:nth-child(1) { animation-delay: 0s; }
        .spinner:nth-child(2) { animation-delay: 0.2s; }
        .spinner:nth-child(3) { animation-delay: 0.4s; }

        @keyframes spin {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .error-box {
            background: var(--danger);
            color: white;
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .error-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        #toast {
            position: fixed;
            bottom: var(--safe-bottom);
            left: var(--safe-left);
            right: var(--safe-right);
            background: var(--bg-alt);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(100px);
            transition: var(--transition);
            pointer-events: none;
            z-index: 1000;
            max-width: 400px;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .device-badge {
            font-size: 0.75rem;
            color: var(--text-dim);
            background: var(--bg);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .theme-wrapper {
            position: relative;
        }

        .theme-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            margin-top: 8px;
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 8px;
            max-width: 300px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 200;
            box-shadow: var(--shadow);
        }

        .theme-dropdown.active {
            display: grid;
        }

        .theme-swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .theme-swatch:hover {
            transform: scale(1.1);
        }

        .theme-swatch.active {
            border-color: var(--text);
            box-shadow: 0 0 0 2px var(--bg-card), 0 0 0 4px var(--text);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }

        .modal-header {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: auto;
            height: auto;
        }

        .modal-close:hover {
            color: var(--text);
        }

        @media (max-width: 768px) {
            .temp-main {
                font-size: 3rem;
            }

            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .daily-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            }

            .settings-grid {
                grid-template-columns: 1fr;
            }

            .header-title {
                font-size: 1.1rem;
            }

            .temperature-display {
                flex-direction: column;
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            .temp-main {
                font-size: 2.5rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .daily-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .location-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .alert {
                flex-direction: column;
                gap: 8px;
            }

            .hourly-item {
                min-width: 70px;
                padding: 8px;
            }

            .modal-content {
                max-width: 100%;
                border-radius: 12px 12px 0 0;
            }
        }

        /* Foldable device support */
        @media (screen-spanning: single-fold-vertical) {
            body {
                display: grid;
                grid-template-columns: env(viewport-segment-width 0 0) env(viewport-segment-width 1 0);
                grid-template-rows: env(viewport-segment-height 0 0);
            }

            main {
                grid-column: 1 / 3;
            }
        }

        @media (screen-spanning: single-fold-horizontal) {
            body {
                display: grid;
                grid-template-rows: env(viewport-segment-height 0 0) env(viewport-segment-height 0 1);
            }
        }
    </style>
</head>
<body data-theme="dark" data-device="mobile">
    <header>
        <div class="header-title">🌤️ Weather</div>
        <div class="header-controls">
            <div class="theme-wrapper">
                <button class="icon-btn" id="theme-btn" title="Change theme">🎨</button>
                <div class="theme-dropdown" id="theme-dropdown"></div>
            </div>
            <button class="icon-btn" id="refresh-btn" title="Refresh">🔄</button>
            <button class="icon-btn" id="device-btn" title="Device">📱</button>
            <button class="icon-btn" id="settings-btn" title="Settings">⚙️</button>
            <span class="device-badge" id="device-badge">📱 mobile</span>
        </div>
    </header>

    <main>
        <div class="tabs">
            <button class="tab-btn active" data-tab="weather">Weather</button>
            <button class="tab-btn" data-tab="garden">Garden</button>
            <button class="tab-btn" data-tab="ai">AI</button>
            <button class="tab-btn" data-tab="settings">Settings</button>
        </div>

        <div id="weather" class="tab-content active">
            <div id="weather-content">
                <div class="loading">
                    <div class="spinner"></div>
